<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Matrix Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7f5; --surface: #ffffff;
    --border: #e2e2dc; --border-strong: #c8c8c0;
    --accent-a: #185FA5; --accent-b: #3B6D11; --accent-r: #A32D2D;
    --text: #1a1a1a; --muted: #6b6b66;
    --cell-bg: #f0f4fb; --cell-focus-border: #378ADD;
    --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "Space Mono", monospace;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px 36px 36px;
    width: 100%; max-width: 420px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.05);
  }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo h1 {
    font-family: "Syne", sans-serif;
    font-size: 1.8rem; font-weight: 700;
    letter-spacing: -0.5px; margin-bottom: 4px;
  }
  .logo h1 span.a { color: var(--accent-a); }
  .logo h1 span.b { color: var(--accent-b); }
  .logo h1 span.r { color: var(--accent-r); }
  .logo p {
    font-size: 0.65rem; color: var(--muted);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: 0.68rem;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .form-group input {
    width: 100%; height: 42px; padding: 0 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--cell-bg); color: var(--text);
    font-family: "Space Mono", monospace; font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .form-group input:focus {
    border-color: var(--cell-focus-border); background: #fff;
    box-shadow: 0 0 0 3px rgba(55,138,221,0.12);
  }
  .alert {
    border-radius: var(--radius-sm);
    padding: 10px 14px; font-size: 0.7rem;
    margin-bottom: 18px; line-height: 1.5;
  }
  .alert-success { background: #f0faf3; border: 1px solid #b8dfc4; color: var(--accent-b); }
  .btn-submit {
    width: 100%; height: 44px;
    background: var(--accent-a); color: #fff;
    border: none; border-radius: 999px;
    font-family: "Space Mono", monospace;
    font-size: 0.8rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; margin-top: 8px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }
  .auth-footer {
    text-align: center; margin-top: 20px;
    font-size: 0.68rem; color: var(--muted);
  }
  .auth-footer a { color: var(--accent-a); text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="auth-card">

  <div class="logo">
    <h1><span class="a">A</span> + <span class="b">B</span> = <span class="r">R</span></h1>
    <p>Matrix Addition Calculator</p>
  </div>

  <div style="margin-bottom:24px;">
    <div style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:6px;">Reset your password</div>
    <div style="font-size:0.72rem;color:var(--muted);line-height:1.6;">
      Enter your email and we&rsquo;ll send you a reset link if an account exists.
    </div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.forgot') }}">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@email.com" required />
    </div>
    <button type="submit" class="btn-submit">Send Reset Link</button>
  </form>

  <div class="auth-footer" style="margin-top:16px;">
    <a href="{{ url_for('auth.login') }}">&larr; Back to login</a>
  </div>

</div>
</body>
</html>
